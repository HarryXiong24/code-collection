<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebSocket Demo (TypeScript)</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 2rem;
      }
      h1 { color: #38bdf8; margin-bottom: .25rem; }
      .subtitle { color: #94a3b8; margin-bottom: 1.25rem; font-size: .9rem; }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: .75rem 1.5rem;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: .75rem 1rem;
        margin-bottom: 1rem;
        width: 100%;
        max-width: 720px;
      }

      .status {
        display: inline-flex; align-items: center; gap: .5rem;
        padding: .35rem .9rem; border-radius: 999px;
        font-size: .8rem; font-weight: 600;
      }
      .status .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
      .status.connecting   { background: #1e3a8a; color: #93c5fd; }
      .status.connected    { background: #064e3b; color: #34d399; }
      .status.reconnecting { background: #78350f; color: #fcd34d; }
      .status.offline      { background: #450a0a; color: #f87171; }

      .stats { display: flex; gap: 1rem; font-size: .78rem; color: #94a3b8; flex-wrap: wrap; }
      .stats b { color: #e2e8f0; font-weight: 600; }

      button {
        background: #334155; color: #e2e8f0; border: 1px solid #475569;
        padding: .3rem .75rem; border-radius: 6px; font-size: .8rem; cursor: pointer;
      }
      button:hover { background: #475569; }
      button.room.active { background: #0369a1; border-color: #0284c7; color: #e0f2fe; }

      #rooms { display: flex; gap: .4rem; }

      input[type=text] {
        background: #0f172a; color: #e2e8f0;
        border: 1px solid #475569; border-radius: 6px;
        padding: .4rem .6rem; font-size: .85rem; font-family: inherit;
      }
      input[type=text]:focus { outline: none; border-color: #38bdf8; }
      #nameInput { width: 9rem; }

      #log {
        width: 100%; max-width: 720px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 1rem;
        height: 55vh;
        overflow-y: auto;
        font-family: 'Fira Code', 'Cascadia Code', monospace;
        font-size: .82rem;
        line-height: 1.6;
      }
      .entry { padding: .3rem 0; word-break: break-word; }
      .entry .time { color: #64748b; }
      .entry .from { color: #a78bfa; font-weight: 600; }
      .entry .text { color: #e2e8f0; }
      .entry.mine .from { color: #34d399; }
      .entry.system .text { color: #64748b; font-style: italic; }

      #typing {
        width: 100%; max-width: 720px;
        height: 1.2rem; padding: .2rem .25rem;
        font-size: .75rem; color: #f472b6; font-style: italic;
      }

      #composer {
        display: flex; gap: .5rem;
        width: 100%; max-width: 720px;
      }
      #input { flex: 1; }
      #composer button { background: #0369a1; border-color: #0284c7; padding: .4rem 1.2rem; }
      #composer button:hover { background: #0284c7; }
    </style>
  </head>
  <body>
    <h1>🔌 WebSocket Demo</h1>
    <p class="subtitle">RFC 6455 by hand — TypeScript backend &amp; TypeScript frontend</p>

    <div class="toolbar">
      <div id="status" class="status connecting"><span class="dot"></span><span id="statusText">Connecting…</span></div>
      <div id="rooms"></div>
      <input type="text" id="nameInput" placeholder="your name" maxlength="24" />
      <button id="disconnectBtn" type="button">Disconnect</button>
    </div>

    <div class="toolbar stats">
      <span>client: <b id="clientId">—</b></span>
      <span>reconnects: <b id="reconnects">0</b></span>
      <span>queued: <b id="queued">0</b></span>
      <span id="presence">—</span>
    </div>

    <div id="log"></div>
    <div id="typing"></div>

    <form id="composer">
      <input type="text" id="input" placeholder="Message… (open a second tab to chat with yourself)" maxlength="2000" autocomplete="off" />
      <button type="submit">Send</button>
    </form>

    <script type="module" src="/static/client.js"></script>
  </body>
</html>
